<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VISIONARY VAULT</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .track {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #333;
    }

    button {
      background: white;
      color: black;
      border: none;
      padding: 8px 15px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <h1>ONLY 4 THE VISIONAIRYS</h1>

  <div class="track">
    <span>1. countonme</span>
    <button onclick="playSong('countonme 3.m4a')">▶ Play</button>
  </div>

  <div class="track">
    <span>2. feelwhatifeel</span>
    <button onclick="playSong('feelwhatifeel.m4a')">▶ Play</button>
  </div>

  <div class="track">
    <span>3. forgetme</span>
    <button onclick="playSong('forgetme 2.m4a')">▶ Play</button>
  </div>

  <div class="track">
    <span>4. outofbreath</span>
    <button onclick="playSong('outofbreath 3.m4a')">▶ Play</button>
  </div>

  <audio id="audioPlayer" controls style="width:100%; margin-top:30px;"></audio>

  <script>
    function playSong(songPath) {
      const player = document.getElementById("audioPlayer");
      player.src = songPath;
      player.play();
    }
  </script>
</body>
</html>
